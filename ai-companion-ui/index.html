<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AKIRA - Your Personal AI Companion. A futuristic, emotionally intelligent assistant.">
    <title>AKIRA | AI Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Cosmic Background -->
    <div class="cosmic-bg">
        <div class="stars"></div>
        <div class="stars stars-2"></div>
        <div class="stars stars-3"></div>
        <div class="cosmic-fog"></div>
        <div class="cosmic-dust"></div>
    </div>

    <!-- Main Container -->
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <span class="time" id="currentTime">9:41 PM</span>
            </div>
            <div class="header-center">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="logo-text">AKIRA</span>
                </div>
            </div>
            <div class="header-right">
                <div class="status-indicators">
                    <svg class="indicator-icon" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="currentColor" stroke-width="1.5"/>
                    </svg>
                </div>
            </div>
        </header>

        <!-- Avatar Section -->
        <section class="avatar-section">
            <div class="avatar-container" id="avatarContainer">
                <!-- Holographic Rings -->
                <div class="holo-ring ring-outer"></div>
                <div class="holo-ring ring-middle"></div>
                <div class="holo-ring ring-inner"></div>
                
                <!-- Particle Effects -->
                <div class="particles" id="particles"></div>
                
                <!-- Waveform for speaking state -->
                <div class="waveform" id="waveform">
                    <span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span><span></span>
                </div>

                <!-- Avatar Image -->
                <div class="avatar-frame">
                    <img src="avatar.png" alt="Akira AI Companion" class="avatar-image" id="avatarImage">
                    <div class="avatar-glow"></div>
                </div>
            </div>

            <!-- Status Text -->
            <div class="status-text" id="statusText">
                <span class="status-indicator"></span>
                <span class="status-label">Ready</span>
            </div>
        </section>

        <!-- Chat Section -->
        <section class="chat-section" id="chatSection">
            <div class="chat-container" id="chatContainer">
                <!-- Messages will be dynamically added -->
                <div class="message user-message">
                    <div class="message-avatar">
                        <svg viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M4 20C4 16.6863 7.13401 14 11 14H13C16.866 14 20 16.6863 20 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <div class="message-bubble">
                        <p>play sahiba on YouTube</p>
                    </div>
                </div>
                
                <div class="message ai-message">
                    <div class="message-avatar ai">
                        <span class="heart-icon">💗</span>
                    </div>
                    <div class="message-bubble">
                        <span class="ai-name">Akira:</span>
                        <p>Playing Sahiba on YouTube.</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Input Section -->
        <section class="input-section">
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" 
                           id="messageInput" 
                           class="message-input" 
                           placeholder="Send a message..."
                           autocomplete="off">
                    <button class="send-btn" id="sendBtn" aria-label="Send message">
                        <svg viewBox="0 0 24 24" fill="none">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                
                <!-- Microphone Button -->
                <button class="mic-btn" id="micBtn" aria-label="Voice input">
                    <div class="mic-glow"></div>
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 1C10.3431 1 9 2.34315 9 4V12C9 13.6569 10.3431 15 12 15C13.6569 15 15 13.6569 15 12V4C15 2.34315 13.6569 1 12 1Z" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M19 10V12C19 15.866 15.866 19 12 19C8.13401 19 5 15.866 5 12V10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M12 19V23M12 23H8M12 23H16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
